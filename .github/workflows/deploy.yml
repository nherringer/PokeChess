# Build & Deploy — PokeChess app repo CI/CD.
#
# On push to main:   build both images, push to ECR, update ECS services;
#                    build Next.js static export, sync to S3, invalidate CloudFront.
# On pull_request:   docker build only + Next.js build check (no AWS).
#
# Required GitHub configuration (Settings → Secrets and variables → Actions):
#   Secrets:
#     AWS_BACKEND_DEPLOY_ROLE_ARN                 — CI app deploy role ARN       (terraform output ci_app_deploy_role_arn)
#     ECR_APP_REPO                 — ECR repo URL for pokechess-app    (terraform output ecr_app_repo_url)
#     ECR_ENGINE_REPO              — ECR repo URL for pokechess-engine  (terraform output ecr_engine_repo_url)
#     AWS_FRONTEND_DEPLOY_ROLE_ARN — CI frontend deploy role ARN  (terraform output ci_app_frontend_deploy_role_arn)
#     FRONTEND_BUCKET_NAME         — S3 bucket for frontend assets (terraform output frontend_bucket_name)
#     CLOUDFRONT_DISTRIBUTION_ID   — CloudFront distribution ID   (terraform output cloudfront_distribution_id)
#
# All values come from the Terraform-PokeChess infrastructure repo (terraform output / console).
# All roles use GitHub OIDC — no long-lived AWS keys are stored.

name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write   # required for OIDC on push (configure-aws-credentials)
  contents: read

env:
  AWS_REGION: us-west-2
  ECS_CLUSTER: pokechess-prod

jobs:
  # ── Path change detection ─────────────────────────────────────────────────────
  # Determines which jobs need to run based on which files changed.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'app/**'
              - 'bot/**'
              - 'engine/**'
              - 'Dockerfile.app'
              - 'Dockerfile.engine'
              - 'requirements*.txt'
            frontend:
              - 'frontend/**'

  # ── pokechess-app ────────────────────────────────────────────────────────────
  deploy-app:
    name: App — build / push / deploy
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_BACKEND_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        if: github.event_name == 'push'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build app image (push)
        if: github.event_name == 'push'
        env:
          IMAGE_SHA: ${{ secrets.ECR_APP_REPO }}:${{ github.sha }}
          IMAGE_LATEST: ${{ secrets.ECR_APP_REPO }}:latest
        run: |
          docker build -f Dockerfile.app -t "$IMAGE_SHA" -t "$IMAGE_LATEST" .

      - name: Build app image (PR — no registry tags)
        if: github.event_name == 'pull_request'
        run: |
          docker build -f Dockerfile.app -t pokechess-app:ci .

      - name: Push app image to ECR
        if: github.event_name == 'push'
        env:
          IMAGE_SHA: ${{ secrets.ECR_APP_REPO }}:${{ github.sha }}
          IMAGE_LATEST: ${{ secrets.ECR_APP_REPO }}:latest
        run: |
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"

      - name: Download current app task definition
        if: github.event_name == 'push'
        run: |
          aws ecs describe-task-definition \
            --task-definition pokechess-app-prod \
            --query taskDefinition \
            --output json > task-def-app.json

      - name: Render updated app task definition
        if: github.event_name == 'push'
        id: render-app
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-app.json
          container-name: pokechess-app
          image: ${{ secrets.ECR_APP_REPO }}:${{ github.sha }}

      - name: Deploy app to ECS
        if: github.event_name == 'push'
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-app.outputs.task-definition }}
          service: pokechess-app
          cluster: ${{ env.ECS_CLUSTER }}
          # Waits for the service to reach steady state before marking the step
          # successful. If the new task fails its health check, ECS rolls back
          # automatically (deployment_circuit_breaker is enabled in Terraform).
          wait-for-service-stability: true
          wait-for-minutes: 10

  # ── pokechess-frontend ───────────────────────────────────────────────────────
  # Runs independently of the backend jobs — no shared dependencies.
  deploy-frontend:
    name: Frontend — build / sync / invalidate
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build static export (push)
        if: github.event_name == 'push'
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.pokechess-game.com
        run: npm run build

      - name: Build static export (PR — verify only)
        if: github.event_name == 'pull_request'
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.pokechess-game.com
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_FRONTEND_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync static assets to S3 (long cache)
        if: github.event_name == 'push'
        run: |
          aws s3 sync frontend/out/ s3://${{ secrets.FRONTEND_BUCKET_NAME }}/ \
            --exclude "*.html" \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

      - name: Sync HTML files to S3 (no cache)
        if: github.event_name == 'push'
        run: |
          aws s3 sync frontend/out/ s3://${{ secrets.FRONTEND_BUCKET_NAME }}/ \
            --exclude "*" --include "*.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --delete

      - name: Invalidate CloudFront cache
        if: github.event_name == 'push'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  # ── pokechess-engine ─────────────────────────────────────────────────────────
  # Runs after deploy-app so a failed app build/push/deploy never leaves the
  # engine image/service ahead of the app. If engine fails after app succeeded,
  # ECS can still be mixed-SHA until a fix is merged (same as any serial deploy).
  deploy-engine:
    name: Engine — build / push / deploy
    needs: [changes, deploy-app]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_BACKEND_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        if: github.event_name == 'push'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build engine image (push)
        if: github.event_name == 'push'
        env:
          IMAGE_SHA: ${{ secrets.ECR_ENGINE_REPO }}:${{ github.sha }}
          IMAGE_LATEST: ${{ secrets.ECR_ENGINE_REPO }}:latest
        run: |
          docker build -f Dockerfile.engine -t "$IMAGE_SHA" -t "$IMAGE_LATEST" .

      - name: Build engine image (PR — no registry tags)
        if: github.event_name == 'pull_request'
        run: |
          docker build -f Dockerfile.engine -t pokechess-engine:ci .

      - name: Push engine image to ECR
        if: github.event_name == 'push'
        env:
          IMAGE_SHA: ${{ secrets.ECR_ENGINE_REPO }}:${{ github.sha }}
          IMAGE_LATEST: ${{ secrets.ECR_ENGINE_REPO }}:latest
        run: |
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"

      - name: Download current engine task definition
        if: github.event_name == 'push'
        run: |
          aws ecs describe-task-definition \
            --task-definition pokechess-engine-prod \
            --query taskDefinition \
            --output json > task-def-engine.json

      - name: Render updated engine task definition
        if: github.event_name == 'push'
        id: render-engine
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-engine.json
          container-name: pokechess-engine
          image: ${{ secrets.ECR_ENGINE_REPO }}:${{ github.sha }}

      - name: Deploy engine to ECS
        if: github.event_name == 'push'
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-engine.outputs.task-definition }}
          service: pokechess-engine
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10
